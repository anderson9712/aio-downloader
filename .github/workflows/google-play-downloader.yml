name: google-play-downloader

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: >
          Android package name.
          Example: com.google.android.youtube
        required: true
        type: string
      architecture:
        description: Target device architecture
        required: true
        type: choice
        default: 'arm64'
        options:
          - arm64
          - armv7
      merge_splits:
        description: Bundle all split APKs into one installable APK
        required: false
        type: boolean
        default: true

jobs:
  actions:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Generate random identifier to prevent name collisions
        id: random
        run: echo "value=$(cat /dev/urandom | tr -dc 'a-z' | fold -w 5 | head -n 1)" >> $GITHUB_OUTPUT

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y -qq openjdk-17-jre-headless apksigner python3 python3-venv python3-pip curl git zip

      - name: Clone gplay-apk-downloader
        run: |
          git clone https://github.com/alltechdev/gplay-apk-downloader.git
          cd gplay-apk-downloader
          ./setup.sh

      - name: Authenticate with Google Play
        run: |
          cd gplay-apk-downloader
          echo "y" | ./gplay auth
          echo "Authentication completed."

      - name: Download APK(s)
        id: download
        run: |
          cd gplay-apk-downloader
          ARCH="${{ inputs.architecture }}"
          MERGE="${{ inputs.merge_splits }}"
          DOWNLOAD_DIR="$RUNNER_TEMP/apk_downloads"
          mkdir -p "$DOWNLOAD_DIR"

          CMD="./gplay download ${{ inputs.package_name }} -a $ARCH -o $DOWNLOAD_DIR"
          if [ "$MERGE" = "true" ]; then
            CMD="$CMD -m"
          fi

          echo "Running: $CMD"
          $CMD

          # Verify at least one file was downloaded
          if [ -z "$(ls -A "$DOWNLOAD_DIR" 2>/dev/null)" ]; then
            echo "Error: No files downloaded"
            exit 1
          fi

          echo "download_dir=$DOWNLOAD_DIR" >> $GITHUB_OUTPUT

      - name: Archive each downloaded file (split ZIP)
        env:
          RANDSTR: ${{ steps.random.outputs.value }}
        run: |
          DOWNLOAD_DIR="${{ steps.download.outputs.download_dir }}"
          UPLOAD_DIR="google-play/$RANDSTR"
          mkdir -p "$UPLOAD_DIR"

          cd "$DOWNLOAD_DIR"
          shopt -s nullglob
          files=(*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No files to process."
            exit 1
          fi

          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "→ Archiving $file"
              # -j : strip path, −s 99m : split at 99 MB
              zip -j -s 99m -r "../$UPLOAD_DIR/${file}.zip" "$file"
            fi
          done

      - name: Cleanup temporary download directory
        run: rm -rf "${{ steps.download.outputs.download_dir }}"

      - name: Upload to google-play folder
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config http.postBuffer 524288000

          FILES=(google-play/*)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No files to upload."
            exit 0
          fi

          git add google-play/
          git commit -m "Download ${{ inputs.package_name }} (${{ inputs.architecture }}) [skip ci]" || echo "Nothing to commit"

          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "Push succeeded."
              break
            else
              if [ $i -lt $RETRIES ]; then
                echo "Push rejected, retrying in 3 seconds..."
                sleep 3
              else
                echo "Push failed after $RETRIES attempts."
                exit 1
              fi
            fi
          done
          echo "All files uploaded to the 'google-play' folder."
